name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  # Bump this to point CI at a different assets release without touching code.
  ASSETS_RELEASE_TAG: v0.1.0

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: client
        run: pnpm install --frozen-lockfile

      - name: Fetch optimized game assets from release
        run: |
          curl -fL "https://github.com/${{ github.repository }}/releases/download/${ASSETS_RELEASE_TAG}/assets_optimized_${ASSETS_RELEASE_TAG}.tar.gz" \
            -o /tmp/assets_optimized.tar.gz
          tar -xzf /tmp/assets_optimized.tar.gz -C client/public

      - name: Build
        working-directory: client
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          VITE_ASSET_DIR: assets_optimized
        run: pnpm build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
